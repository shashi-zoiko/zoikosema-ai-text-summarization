<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZoikoSema — Asking to be let in</title>
<style>
  /* ============================================================
     THEME TOKENS — every colour is a variable so a theme switch
     re-paints the whole page and nothing loses contrast.
     Light is the :root default; [data-theme="dark"] overrides.
     ============================================================ */
  :root {
    --bg: #f1f3f7;
    --surface: #ffffff;
    --surface-2: #f5f6fa;
    --text-primary: #0f172a;   /* ~15:1 on surface */
    --text-secondary: #5b657a; /* ~5.4:1 on surface — legible, not faded */
    --text-faint: #8a93a6;
    --border: #e4e7ee;
    --border-strong: #cfd4df;  /* used on the ghost button so it never vanishes */
    --accent: #7c3aed;
    --accent-2: #6d28d9;
    --accent-hover: #6d28d9;
    --accent-soft: #f3f0ff;
    --accent-line: #e4dcfb;
    --accent-on: #ffffff;      /* text/icon that sits ON the accent gradient */
    --success: #0f9d6c;
    --warning: #b45309;
    --danger: #dc2626;
    --grad-a: #8b5cf6;
    --grad-b: #6d28d9;
    /* Shadows: strong & dark in light mode. */
    --card-shadow: 0 1px 2px rgba(15,23,42,.06), 0 30px 60px -24px rgba(15,23,42,.28);
    --pill-shadow: 0 1px 2px rgba(15,23,42,.05);
    --ring: rgba(124,58,237,.45);
  }
  [data-theme="dark"] {
    --bg: #0a0d14;
    --surface: #141924;
    --surface-2: #1b2130;
    --text-primary: #f1f5f9;
    --text-secondary: #a3adc0; /* ~6:1 on surface — a real colour, not reduced opacity */
    --text-faint: #7c8598;
    --border: rgba(255,255,255,.10);
    --border-strong: rgba(255,255,255,.20); /* stays visible on the dark card */
    --accent: #a78bfa;
    --accent-2: #8b5cf6;
    --accent-hover: #9575f5;
    --accent-soft: color-mix(in srgb, #8b5cf6 15%, var(--surface));
    --accent-line: color-mix(in srgb, #8b5cf6 34%, transparent);
    --accent-on: #ffffff;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --grad-a: #a78bfa;
    --grad-b: #7c3aed;
    /* Shadows: soft diffuse glow in dark mode, no harsh black slab. */
    --card-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 24px 70px -20px rgba(0,0,0,.7);
    --pill-shadow: 0 1px 2px rgba(0,0,0,.3);
    --ring: rgba(167,139,250,.55);
  }

  * { box-sizing: border-box; }

  /* One transition rule covers the theme cross-fade everywhere. */
  body, .topbar, .card, .code-pill, .btn-ghost, .help, .user-chip,
  .managed, .switch, .switch-knob, .wordmark b, .wordmark span {
    transition: background-color .2s ease, color .2s ease,
                border-color .2s ease, box-shadow .2s ease;
  }

  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  :focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
    border-radius: 10px;
  }

  /* ─────────────── Top bar ─────────────── */
  .topbar {
    height: 64px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 20px;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(14px);
  }
  .brand { display: flex; align-items: center; gap: 18px; min-width: 0; }
  .wordmark { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
  .wordmark .mark {
    width: 26px; height: 26px; border-radius: 8px;
    background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
    display: grid; place-items: center; color: #fff;
    box-shadow: 0 6px 16px -6px var(--grad-b);
  }
  .wordmark b { color: var(--text-primary); }
  .wordmark span { color: var(--accent); }
  .meeting-meta {
    padding-left: 18px;
    border-left: 1px solid var(--border);
    min-width: 0;
  }
  @media (max-width: 720px) { .meeting-meta { display: none; } }
  .meeting-meta .title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .meeting-meta .sub { margin-top: 2px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  .verified { color: var(--success); display: inline-flex; }
  .managed {
    background: var(--accent-soft);
    color: var(--accent-2);
    border: 1px solid var(--accent-line);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  [data-theme="dark"] .managed { color: var(--accent); }

  .actions { display: flex; align-items: center; gap: 14px; }

  /* iOS-style theme switch */
  .switch {
    position: relative;
    width: 52px; height: 28px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .switch-knob {
    position: absolute; top: 2px; left: 2px;
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
    display: grid; place-items: center; color: #fff;
    transition: transform .28s cubic-bezier(.34,1.56,.64,1), background .2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  [data-theme="dark"] .switch-knob { transform: translateX(24px); }
  .switch-knob svg { width: 13px; height: 13px; }
  .switch .moon { display: none; }
  [data-theme="dark"] .switch .sun { display: none; }
  [data-theme="dark"] .switch .moon { display: block; }

  .help {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px; border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .help:hover { color: var(--text-primary); border-color: var(--border-strong); }
  @media (max-width: 560px) { .help span { display: none; } }

  .user-chip { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #ec4899, #db2777);
    color: #fff; display: grid; place-items: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .user-chip .who { line-height: 1.25; }
  .user-chip .who .n { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .user-chip .who .e { font-size: 11.5px; color: var(--text-secondary); }
  .user-chip .chev { color: var(--text-faint); }
  @media (max-width: 560px) { .user-chip .who { display: none; } }

  /* ─────────────── Centre stage ─────────────── */
  main { flex: 1; display: grid; place-items: center; padding: 24px; }

  .card {
    width: 100%;
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    text-align: center;
    box-shadow: var(--card-shadow);
    animation: card-in .48s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(14px) scale(.985); }
    to   { opacity: 1; transform: none; }
  }

  /* Gradient icon + slow, smooth spinning arc */
  .spinner {
    width: 68px; height: 68px; margin: 0 auto 22px;
    border-radius: 18px;
    background: linear-gradient(140deg, var(--grad-a), var(--grad-b));
    display: grid; place-items: center;
    box-shadow: 0 14px 34px -12px var(--grad-b);
  }
  .spinner .arc {
    width: 30px; height: 30px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.32);
    border-top-color: #fff;
    animation: spin 1.15s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -.01em; color: var(--text-primary); }
  .card p { margin: 10px auto 0; max-width: 340px; font-size: 14px; line-height: 1.55; color: var(--text-secondary); }

  .code-pill {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 22px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-line);
    font-size: 12.5px;
  }
  .code-pill .ico { color: var(--accent); display: inline-flex; }
  .code-pill .lbl { color: var(--text-secondary); }
  .code-pill .code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-weight: 700; color: var(--text-primary); letter-spacing: .01em; }

  /* Three calm pulsing dots */
  .dots { display: flex; justify-content: center; gap: 7px; margin-top: 24px; }
  .dots i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    display: block;
    animation: dot 1.4s ease-in-out infinite;
  }
  .dots i:nth-child(2) { animation-delay: .2s; }
  .dots i:nth-child(3) { animation-delay: .4s; }
  @keyframes dot {
    0%, 100% { opacity: .28; transform: scale(.82); }
    40%      { opacity: 1;  transform: scale(1); }
  }

  .btn-ghost {
    margin-top: 26px;
    height: 44px; padding: 0 28px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-primary);
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer;
    transition: background-color .18s ease, border-color .18s ease, transform .1s ease;
  }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--accent-line); }
  .btn-ghost:active { transform: scale(.96); }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .spinner .arc, .dots i { animation: none; }
  }
</style>
</head>
<body>
  <!-- ─────────────── Top bar ─────────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="wordmark">
        <span class="mark" aria-hidden="true">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
        </span>
        <span aria-label="ZoikoSema"><b>Zoiko</b><span>Sema</span></span>
      </div>
      <div class="meeting-meta">
        <div class="title">Instant meeting</div>
        <div class="sub">
          Zoiko Group Workspace
          <span class="verified" title="Verified workspace" aria-label="Verified">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
          </span>
          <span class="managed">Managed by Zoiko Group</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="switch" id="themeSwitch" role="switch" aria-checked="false" aria-label="Toggle dark mode">
        <span class="switch-knob" aria-hidden="true">
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        </span>
      </button>

      <button class="help"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg><span>Help</span></button>

      <div class="user-chip">
        <span class="avatar" aria-hidden="true">AS</span>
        <span class="who">
          <span class="n" style="display:block">Ashraf shaik</span>
          <span class="e" style="display:block">kaamilashraf123@gmail.com</span>
        </span>
        <span class="chev" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
      </div>
    </div>
  </header>

  <!-- ─────────────── Waiting card ─────────────── -->
  <main>
    <section class="card" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"><div class="arc"></div></div>
      <h1>Asking to be let in</h1>
      <p>You'll join automatically once the host lets you in. This usually takes a few seconds.</p>

      <div class="code-pill">
        <span class="ico" aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/></svg></span>
        <span class="lbl">Code</span>
        <span class="code">pja-wkqg-gwa</span>
      </div>

      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>

      <div><button class="btn-ghost" id="cancelBtn">Cancel</button></div>
    </section>
  </main>

<script>
  // Theme: honour the saved choice, else the OS preference on first load.
  (function () {
    var KEY = 'zoiko_lobby_theme';
    var root = document.documentElement;
    var saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}
    var initial = saved
      || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    apply(initial);

    var sw = document.getElementById('themeSwitch');
    sw.addEventListener('click', function () {
      apply(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // Follow live OS changes only until the user makes a manual choice.
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
        var hasChoice; try { hasChoice = localStorage.getItem(KEY); } catch (e2) {}
        if (!hasChoice) apply(e.matches ? 'dark' : 'light');
      });
    }

    function apply(theme) {
      root.setAttribute('data-theme', theme);
      sw.setAttribute('aria-checked', theme === 'dark' ? 'true' : 'false');
      try { localStorage.setItem(KEY, theme); } catch (e) {}
    }

    document.getElementById('cancelBtn').addEventListener('click', function () {
      // Demo hook — wire to your leave-waiting-room handler.
      this.textContent = 'Cancelling…';
    });
  })();
</script>
</body>
</html>
