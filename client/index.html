<!doctype html>
<html lang="en" data-theme="midnight">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />

    <!-- Favicons / app icons (ZoikoSema logo) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <title>ZoikoSema – Meetings, Chat, Webinars in one workspace</title>
    <meta name="description" content="Secure browser-based meetings with HD video, screen sharing, chat and collaboration." />
    <link rel="canonical" href="https://meet.zoikosema.com/" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn, Discord, Slack, Telegram) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZoikoSema" />
    <meta property="og:title" content="ZoikoSema – Meetings, Chat, Webinars in one workspace" />
    <meta property="og:description" content="Secure browser-based meetings with HD video, screen sharing, chat and collaboration." />
    <meta property="og:image" content="https://meet.zoikosema.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ZoikoSema — Meetings, Chat, Webinars in one workspace" />
    <meta property="og:url" content="https://meet.zoikosema.com/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZoikoSema – Meetings, Chat, Webinars in one workspace" />
    <meta name="twitter:description" content="Secure browser-based meetings with HD video, screen sharing and collaboration." />
    <meta name="twitter:image" content="https://meet.zoikosema.com/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
    <script>
      // Apply persisted theme before paint to avoid FOUC
      (function () {
        try {
          var t = localStorage.getItem('zoiko_theme') || 'midnight'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
