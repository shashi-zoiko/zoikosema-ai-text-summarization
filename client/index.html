<!doctype html>
<html lang="en" data-theme="midnight">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />
    <title>ZoikoSema — Meetings, Chat, Webinars in one workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
    <script>
      // Apply persisted theme before paint to avoid FOUC
      (function () {
        try {
          var t = localStorage.getItem('zoiko_theme') || 'midnight'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
