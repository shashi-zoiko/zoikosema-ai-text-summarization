server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dual-env DNS: Docker's embedded DNS (127.0.0.11) resolves `server`
    # in docker-compose; Google Public DNS keeps nginx healthy on Cloud Run
    # where 127.0.0.11 doesn't exist. On Cloud Run the SPA calls the server
    # directly via VITE_API_BASE, so these proxy blocks aren't exercised.
    # Variable in proxy_pass defers resolution to request time so nginx
    # boots even when `server` can't be resolved.
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 ipv6=off valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        set $upstream "server:8080";
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        set $upstream "server:8080";
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
