server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS for compose. Harmless on Cloud Run, where the
    # SPA talks directly to the server via VITE_API_BASE and these proxy
    # blocks are never exercised. The `set $upstream` + variable in
    # proxy_pass defers DNS resolution to request time so nginx can boot
    # even when `server` can't be resolved (e.g. on Cloud Run).
    resolver 127.0.0.11 ipv6=off valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        set $upstream "server:8080";
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        set $upstream "server:8080";
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
