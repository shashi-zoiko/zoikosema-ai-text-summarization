name: CI/CD Deploy

# Auto-deploy-on-push disabled here: this fork has no GCP_SA_KEY / DATABASE_URL
# / LIVEKIT_* secrets configured, so every push to main was failing at the
# auth step. Still runnable manually (Actions tab -> CI/CD Deploy -> Run
# workflow) once those secrets exist, for whoever actually deploys this.
on:
  workflow_dispatch: {}

env:
  # PROJECT / REGION for the whole pipeline. Migrated 2026-07 from the old
  # project (project-4b10b0ae-f69d-47e2-90d, europe-west1) to the `zoiko-sema`
  # project in asia-southeast1 (Singapore) — the old project hit the Cloud Run
  # "number of regions used" quota (5/5). Singapore supports Cloud Run domain
  # mappings (native custom-domain, no Load Balancer) and sits ~50ms from the
  # Supabase DB (ap-south-1). Every project reference below derives from
  # PROJECT_ID so there is a single source of truth and no path can silently
  # target the old project.
  #
  # PREREQUISITE: the `zoiko-meet` Artifact Registry repo must exist in zoiko-sema
  # before the first push, or the image push fails ("Repository not found"). The
  # deploy SA may lack artifactregistry.repositories.create; if the self-provision
  # step below is denied, create it once in Cloud Shell:
  #   gcloud artifacts repositories create zoiko-meet --repository-format=docker \
  #     --location=asia-southeast1 --project=zoiko-sema
  PROJECT_ID: zoiko-sema
  REGISTRY: asia-southeast1-docker.pkg.dev/zoiko-sema/zoiko-meet
  REGION: asia-southeast1

jobs:
  build-and-push:
    name: Build and Push Unified Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
      # Self-provision the AR repo so a fresh region (or project) needs no manual
      # Cloud Shell step — a direct pkg.dev push does NOT auto-create it, so the
      # first deploy to a new region 500s with "Repository not found" otherwise.
      # Idempotent: describe first, create only if absent. Needs the deploy SA to
      # have artifactregistry.repositories.create (Artifact Registry Admin).
      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe zoiko-meet \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} >/dev/null 2>&1 || \
          gcloud artifacts repositories create zoiko-meet \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push unified app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/app:latest
          # VITE_API_BASE is baked into the SPA at build time. Leave the
          # GitHub repo variable empty so the SPA uses relative URLs that
          # hit the same Cloud Run service that serves it (same origin).
          # Set it only if you need to point the SPA at a different API host.
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}

  deploy:
    name: Deploy Unified App to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service: zoiko-meet-git
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/app:latest
          # CORS_ORIGINS still configurable for any external clients, but
          # the SPA itself is same-origin now so CORS isn't on the hot path.
          # DATABASE_URL MUST point at Supabase's TRANSACTION pooler (host
          # ...pooler.supabase.com, port 6543) — Cloud Run is IPv4-only so the
          # direct db.<ref>.supabase.co host won't work, and the SESSION pooler
          # (port 5432) caps at 15 clients: with pool_size=20 (+10 overflow)
          # across up to 2 instances it throws FATAL EMAXCONNSESSION and every
          # DB route 500s. The secret value must use :6543, NOT :5432.
          #
          # IMPORTANT: this action REPLACES the service's full runtime env on
          # every deploy. Any var NOT listed here is wiped — so MEDIA_PROVIDER /
          # LIVEKIT_* MUST live here, not just in the GCP console, or the SFU
          # silently turns off after each deploy and /media-token 503s
          # ("Live video is temporarily unavailable"). LIVEKIT_WS_URL and
          # LIVEKIT_PUBLIC_WS_URL are both the wss://<project>.livekit.cloud URL.
          # NB: the server env var is LIVEKIT_WS_URL (config field name), but the
          # GitHub secret holding that value is named LIVEKIT_URL — hence the
          # name difference on that one line below. (Comments must stay OUT of
          # the env_vars block: it is a literal string parsed as KEY=VALUE lines.)
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            MEDIA_PROVIDER=livekit
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            LIVEKIT_WS_URL=${{ secrets.LIVEKIT_URL }}
            LIVEKIT_PUBLIC_WS_URL=${{ secrets.LIVEKIT_PUBLIC_WS_URL }}
            E2EE_SECRET=${{ secrets.E2EE_SECRET }}
            GOOGLE_CALENDAR_CLIENT_ID=${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
            GOOGLE_CALENDAR_CLIENT_SECRET=${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
            GOOGLE_CALENDAR_REDIRECT_URI=${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
            MICROSOFT_CALENDAR_CLIENT_ID=${{ secrets.MICROSOFT_CALENDAR_CLIENT_ID }}
            MICROSOFT_CALENDAR_CLIENT_SECRET=${{ secrets.MICROSOFT_CALENDAR_CLIENT_SECRET }}
            MICROSOFT_CALENDAR_REDIRECT_URI=${{ secrets.MICROSOFT_CALENDAR_REDIRECT_URI }}
            MICROSOFT_CALENDAR_TENANT=${{ secrets.MICROSOFT_CALENDAR_TENANT }}
            TOKEN_VAULT_KEY=${{ secrets.TOKEN_VAULT_KEY }}
            REDIS_URL=${{ secrets.REDIS_URL }}
          # SINGLE INSTANCE (min=max=1) is REQUIRED, not just for cold starts:
          # the meeting signaling manager (app/websocket/manager.py) keeps room
          # membership in PROCESS memory with no Redis fanout, so every socket
          # of one meeting must live on the SAME instance. With autoscaling,
          # Cloud Run would split a 50-100 person meeting across instances and
          # peers on different boxes would never receive each other's
          # peer-joined / chat / media-state events. Pinning to one instance
          # keeps the whole meeting coherent. concurrency=200 lets that one
          # instance hold a full large meeting — each WebSocket is one
          # long-lived request, so concurrency must exceed peak participants
          # (was 40, which capped a single instance at ~40 sockets and forced
          # a split). 2 CPU + 2Gi comfortably runs uvicorn + WS fanout for
          # ~100 mostly-idle sockets. When you need MULTIPLE concurrent large
          # meetings beyond one box, wire meeting fanout through the Redis the
          # connect module already provisions, then raise max-instances again.
          # --allow-unauthenticated grants allUsers the Cloud Run Invoker role so
          # the public SPA/API is reachable in a browser. A fresh service (new
          # region) defaults to REQUIRE-auth and returns 403 "client does not have
          # permission" until this is set; the old europe-west1 service had the
          # public IAM binding set once and kept it across redeploys, which is why
          # only the new Mumbai service 403'd.
          flags: |
            --allow-unauthenticated
            --min-instances=1
            --max-instances=1
            --cpu=2
            --memory=2Gi
            --concurrency=200
            --timeout=3600
            --cpu-boost
