name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: europe-west1-docker.pkg.dev/project-4b10b0ae-f69d-47e2-90d/zoiko-meet
  REGION: europe-west1

jobs:
  build-and-push:
    name: Build and Push Unified Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push unified app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/app:latest
          # VITE_API_BASE is baked into the SPA at build time. Leave the
          # GitHub repo variable empty so the SPA uses relative URLs that
          # hit the same Cloud Run service that serves it (same origin).
          # Set it only if you need to point the SPA at a different API host.
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}

  deploy:
    name: Deploy Unified App to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zoiko-meet-git
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/app:latest
          # CORS_ORIGINS still configurable for any external clients, but
          # the SPA itself is same-origin now so CORS isn't on the hot path.
          # DATABASE_URL MUST point at Supabase's TRANSACTION pooler (host
          # ...pooler.supabase.com, port 6543) — Cloud Run is IPv4-only so the
          # direct db.<ref>.supabase.co host won't work, and the SESSION pooler
          # (port 5432) caps at 15 clients: with pool_size=20 (+10 overflow)
          # across up to 2 instances it throws FATAL EMAXCONNSESSION and every
          # DB route 500s. The secret value must use :6543, NOT :5432.
          #
          # IMPORTANT: this action REPLACES the service's full runtime env on
          # every deploy. Any var NOT listed here is wiped — so MEDIA_PROVIDER /
          # LIVEKIT_* MUST live here, not just in the GCP console, or the SFU
          # silently turns off after each deploy and /media-token 503s
          # ("Live video is temporarily unavailable"). LIVEKIT_WS_URL and
          # LIVEKIT_PUBLIC_WS_URL are both the wss://<project>.livekit.cloud URL.
          # NB: the server env var is LIVEKIT_WS_URL (config field name), but the
          # GitHub secret holding that value is named LIVEKIT_URL — hence the
          # name difference on that one line below. (Comments must stay OUT of
          # the env_vars block: it is a literal string parsed as KEY=VALUE lines.)
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            MEDIA_PROVIDER=livekit
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            LIVEKIT_WS_URL=${{ secrets.LIVEKIT_URL }}
            LIVEKIT_PUBLIC_WS_URL=${{ secrets.LIVEKIT_PUBLIC_WS_URL }}
            E2EE_SECRET=${{ secrets.E2EE_SECRET }}
            DB_POOL_SIZE=40
          # === SINGLE-MEETING EVENT CONFIG (50-60 participants, 3-4h) ===
          # The meeting control WebSocket (meet_manager) is in-memory per
          # process with NO Redis fanout, so every participant MUST land on the
          # SAME instance or chat/roster/reactions/raise-hand/waiting-room split
          # in two. To guarantee that without a Redis rebuild we pin to ONE
          # instance and make it big enough to hold the whole meeting:
          #   max-instances=1  -> hard guarantee of a single instance (no
          #                       scale-out => no signaling split-brain). A 2nd
          #                       instance can't inherit in-memory WS state, so
          #                       it would fragment the room, not rescue it.
          #   concurrency=250  -> must exceed ~60 long-lived WS + REST/join
          #                       bursts so Cloud Run never wants a 2nd instance.
          #   cpu=4 / memory=2Gi -> 60-way WS fanout + REST on one box; 1Gi was
          #                       tight. min-instances=1 keeps it warm (no cold
          #                       start on first join).
          #   timeout=3600     -> a control WS is one long-lived request; the
          #                       default 300s ceiling would drop every WS at
          #                       5 min. 3600s is the Cloud Run max.
          # Trade-off: single point of failure (instance restart drops the
          # meeting for a few seconds; media survives on LiveKit). Safe ONLY
          # while exactly one large meeting runs at a time.
          #
          # REVERT after the event to the normal autoscaled steady-state:
          #   --max-instances=10  --cpu=2  --memory=1Gi
          #   --concurrency=40    --timeout=300
          # (min-instances=1 and --cpu-boost stay the same in both configs.)
          # ALSO remove the DB_POOL_SIZE=40 line from env_vars above on revert
          # (drops back to the code default of 20). A high per-instance pool is
          # fine on ONE instance, but multiplied across max-instances=10 it
          # raises the total connection count against Supabase.
          flags: |
            --min-instances=1
            --max-instances=1
            --cpu=4
            --memory=2Gi
            --concurrency=250
            --timeout=3600
            --cpu-boost
