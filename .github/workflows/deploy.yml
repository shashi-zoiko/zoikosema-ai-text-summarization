name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: europe-west1-docker.pkg.dev/project-4b10b0ae-f69d-47e2-90d/zoiko-meet
  REGION: europe-west1

jobs:
  build-and-push:
    name: Build and Push Unified Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push unified app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/app:latest
          # VITE_API_BASE is baked into the SPA at build time. Leave the
          # GitHub repo variable empty so the SPA uses relative URLs that
          # hit the same Cloud Run service that serves it (same origin).
          # Set it only if you need to point the SPA at a different API host.
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}

  deploy:
    name: Deploy Unified App to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zoiko-meet-git
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/app:latest
          # CORS_ORIGINS still configurable for any external clients, but
          # the SPA itself is same-origin now so CORS isn't on the hot path.
          # DATABASE_URL points at Supabase (Session Pooler — Cloud Run is
          # IPv4-only, the direct db.<ref>.supabase.co host won't work).
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          # min-instances=1 eliminates cold starts on the first request after
          # idle (default is 0 → ~5-10s pull+boot on each idle wake). 2 CPU
          # + 1Gi memory is the smallest tier that comfortably runs uvicorn +
          # active WebSocket fanout without GC churn. concurrency=40 keeps
          # any single instance from hoarding DB pool connections (pool_size
          # is 20, so >40 concurrent requests would queue on the pool).
          flags: |
            --min-instances=1
            --max-instances=10
            --cpu=2
            --memory=1Gi
            --concurrency=40
            --timeout=300
            --cpu-boost
