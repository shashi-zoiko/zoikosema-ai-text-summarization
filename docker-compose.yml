services:
  db:
    image: postgres:16-alpine
    container_name: zoiko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoiko
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zoiko_dev}
      POSTGRES_DB: zoiko
    volumes:
      - zoiko_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoiko -d zoiko"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zoiko-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:v1.12.0
    container_name: zoiko-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7880:7880"            # HTTP/WS signaling
      - "7881:7881"            # TCP fallback for ICE
      - "7882:7882/udp"        # primary UDP media
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 3s
      retries: 10

  livekit-egress:
    image: livekit/egress:v1.12.0
    container_name: zoiko-livekit-egress
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    depends_on:
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Chromium inside the container needs SYS_ADMIN to launch the sandbox.
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./infra/livekit/egress.yaml:/etc/egress.yaml:ro
      - zoiko_recordings:/out   # shared with the server so it can serve files

  server:
    build:
      context: ./server
    container_name: zoiko-server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zoiko:zoiko_dev@db:5432/zoiko}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@zoikomeet.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ZoikoSema}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      # AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
      # LiveKit
      MEDIA_PROVIDER: ${MEDIA_PROVIDER:-livekit}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevsecret}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-ws://livekit:7880}
      LIVEKIT_PUBLIC_WS_URL: ${LIVEKIT_PUBLIC_WS_URL:-ws://localhost:7880}
      # Redis (used by livekit clustering + control plane fanout)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8080"
    volumes:
      - zoiko_uploads:/app/uploads
      - zoiko_recordings:/app/recordings

  client:
    # Production-style nginx serving the built React bundle. In dev you should
    # `npm run dev` from ./client (Vite at :5173 with proxy to :8001) — this
    # container is gated behind the `prod-like` profile so `docker compose up`
    # doesn't try to bind :8080 in the dev workflow.
    profiles: ["prod-like"]
    build:
      context: ./client
    container_name: zoiko-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:8080"

volumes:
  zoiko_pg_data:
  zoiko_uploads:
  zoiko_recordings:
